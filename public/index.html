<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudOS - Mobile Fast Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions */
        .upload-card { transition: all 0.3s ease; }
        .upload-card.completed { opacity: 0.6; }
        .upload-card.cancelled { opacity: 0.4; filter: grayscale(100%); }
        
        /* Mobile touch optimization */
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-[100dvh] w-full flex flex-col overflow-hidden select-none">

    <header class="bg-blue-600 text-white h-14 flex items-center justify-between px-4 shrink-0 z-20 shadow-md">
        <div class="flex items-center gap-3 w-2/3">
            <button onclick="goBack()" id="backBtn" class="hidden p-2 -ml-2 rounded-full hover:bg-blue-700 transition active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-lg font-bold tracking-wide truncate" id="pathDisplay">CloudOS</h1>
        </div>
        <button class="p-2 text-blue-100 hover:text-white" onclick="loadFiles()">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </header>

    <div class="bg-white border-b border-gray-200 p-3 flex flex-col gap-3 shrink-0 z-10 shadow-sm">
        <div class="flex gap-2 w-full">
            <input type="text" id="folderName" placeholder="New Folder..." class="flex-1 bg-gray-100 px-4 py-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="createFolder()" class="bg-gray-800 active:bg-gray-700 text-white px-5 py-2.5 rounded-lg font-semibold text-sm transition-transform active:scale-95">Create</button>
        </div>
        
        <div class="flex gap-2 w-full">
            <label class="flex-1 flex items-center justify-center gap-2 bg-blue-100 text-blue-700 px-4 py-3 rounded-lg active:bg-blue-200 cursor-pointer transition font-bold text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Upload Files
                <input type="file" multiple class="hidden" onchange="queueFiles(event)">
            </label>
            <label class="hidden sm:flex flex-1 items-center justify-center gap-2 bg-indigo-50 text-indigo-700 px-4 py-3 rounded-lg hover:bg-indigo-100 cursor-pointer transition font-bold text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                Upload Folder
                <input type="file" webkitdirectory directory multiple class="hidden" onchange="queueFiles(event)">
            </label>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto bg-white pb-24">
        <div class="px-4 py-2 border-b border-gray-100 flex justify-between items-center bg-gray-50/80 sticky top-0 z-10 backdrop-blur-sm">
            <label class="flex items-center gap-3 text-sm font-medium text-gray-500 p-1">
                <input type="checkbox" id="selectAll" class="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500" onchange="toggleSelectAll(this)">
                Select All
            </label>
        </div>
        
        <div id="fileList" class="flex flex-col">
            </div>
    </main>

    <div id="bulkActionBar" class="fixed bottom-0 left-0 w-full bg-gray-900 text-white p-3 sm:p-4 flex flex-col sm:flex-row justify-between items-center transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.2)] z-30 pb-safe">
        <div class="font-semibold text-gray-300 mb-2 sm:mb-0 w-full text-center sm:text-left"><span id="selectedCount" class="text-white font-bold text-lg">0</span> selected</div>
        <div class="flex gap-2 w-full sm:w-auto">
            <button onclick="bulkCopy()" class="flex-1 sm:flex-none bg-gray-800 active:bg-gray-700 py-2.5 px-4 rounded-lg font-medium transition text-sm">Copy</button>
            <button onclick="bulkMove()" class="flex-1 sm:flex-none bg-gray-800 active:bg-gray-700 py-2.5 px-4 rounded-lg font-medium transition text-sm">Move</button>
            <button onclick="bulkDelete()" class="flex-1 sm:flex-none bg-red-600 active:bg-red-500 py-2.5 px-4 rounded-lg font-medium transition text-sm">Delete</button>
        </div>
    </div>

    <div id="uploadManager" class="fixed bottom-0 left-0 w-full sm:bottom-6 sm:right-6 sm:left-auto sm:w-96 bg-white border border-gray-200 shadow-2xl rounded-t-2xl sm:rounded-xl flex flex-col hidden z-40 max-h-[60dvh] sm:max-h-[60vh]">
        <div class="bg-gray-900 text-white p-4 rounded-t-2xl sm:rounded-t-xl flex justify-between items-center shrink-0">
            <h3 class="font-bold text-sm" id="uploadTitle">Uploads</h3>
            <div class="flex gap-4">
                <button id="clearUploadsBtn" class="text-xs text-gray-400 hover:text-white" onclick="clearCompletedUploads()">Clear Done</button>
                <button class="text-gray-400 hover:text-white" onclick="toggleUploadQueue()">
                    <svg class="w-5 h-5 transform transition-transform" id="uploadChevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
            </div>
        </div>
        <div id="uploadList" class="flex-1 overflow-y-auto p-3 space-y-3 bg-gray-50 hide-scroll transition-all duration-300">
            </div>
    </div>

    <div id="actionModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center opacity-0 transition-opacity duration-200" onclick="if(event.target === this) closeModal()">
        <div class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-2xl p-6 shadow-2xl transform translate-y-full sm:translate-y-0 sm:scale-95 transition-all duration-300" id="actionModalContent">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h3 id="modalTitle" class="text-lg font-bold text-gray-900 mb-6 truncate border-b pb-4">Options</h3>
            <div id="modalButtons" class="flex flex-col gap-3"></div>
            <button onclick="closeModal()" class="mt-4 w-full bg-gray-100 text-gray-700 p-3.5 rounded-xl font-bold active:bg-gray-200 transition text-sm">Cancel</button>
        </div>
    </div>

    <script>
        let currentPath = '';
        let selectedItems = new Set();
        let actionItem = null;
        let isNavigating = false; 

        // --- CONCURRENT UPLOAD SYSTEM ---
        const MAX_CONCURRENT_UPLOADS = 5; 
        let uploadQueue = [];
        let activeUploads = 0;
        let uploadIdCounter = 0;
        const taskMap = new Map();

        function formatBytes(bytes, decimals = 2) {
            if (!bytes) return '0 B';
            const k = 1024, dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        document.addEventListener('DOMContentLoaded', loadFiles);

        async function loadFiles() {
            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(currentPath)}`);
                const data = await res.json();
                if (data.error) return alert(data.error);

                selectedItems.clear();
                updateBulkUI();
                document.getElementById('selectAll').checked = false;

                document.getElementById('pathDisplay').innerText = currentPath ? `/${currentPath}` : 'Root';
                document.getElementById('backBtn').classList.toggle('hidden', currentPath === '');
                
                const list = document.getElementById('fileList');
                list.innerHTML = '';

                if (data.files.length === 0) {
                    list.innerHTML = `<div class="py-20 text-center text-gray-400 font-medium text-base">Folder is empty</div>`;
                    return;
                }

                data.files.sort((a, b) => b.isDirectory - a.isDirectory).forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'flex items-center justify-between p-3 border-b border-gray-100 bg-white active:bg-blue-50 transition-colors';
                    
                    let icon = file.isDirectory ? 
                        `<svg class="w-8 h-8 text-blue-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>` : 
                        `<svg class="w-8 h-8 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`;

                    const isChecked = selectedItems.has(file.name);
                    
                    item.innerHTML = `
                        <div class="flex items-center gap-3 w-[calc(100%-3rem)]">
                            <input type="checkbox" class="file-checkbox w-6 h-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500 shrink-0" value="${file.name}" ${isChecked ? 'checked' : ''} onchange="toggleSelection(this, '${file.name}')">
                            <div class="flex items-center gap-3 w-full min-w-0" onclick="if(${file.isDirectory}) navigateTo('${file.name}')">
                                ${icon}
                                <div class="flex flex-col min-w-0 w-full">
                                    <span class="truncate font-semibold text-gray-800 text-sm ${file.isDirectory ? 'text-blue-600' : ''}">${file.name}</span>
                                    <span class="text-xs text-gray-400">${file.isDirectory ? 'Folder' : formatBytes(file.size)}</span>
                                </div>
                            </div>
                        </div>
                        <button onclick="openModal('${file.name}', ${file.isZip})" class="p-3 text-gray-400 active:text-blue-600 shrink-0 active:bg-blue-50 rounded-full">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path></svg>
                        </button>
                    `;
                    list.appendChild(item);
                });
            } catch (err) { console.error(err); }
        }

        // --- NAVIGATION & BULK ACTIONS ---
        function navigateTo(folder) {
            if (isNavigating) return;
            isNavigating = true;
            currentPath = currentPath ? `${currentPath}/${folder}` : folder;
            loadFiles().finally(() => isNavigating = false);
        }

        function goBack() {
            if (isNavigating || !currentPath) return;
            isNavigating = true;
            const parts = currentPath.split('/');
            parts.pop();
            currentPath = parts.join('/');
            loadFiles().finally(() => isNavigating = false);
        }

        function toggleSelection(checkbox, name) {
            if (checkbox.checked) selectedItems.add(name);
            else selectedItems.delete(name);
            updateBulkUI();
        }

        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('.file-checkbox');
            if (checkbox.checked) {
                checkboxes.forEach(cb => { cb.checked = true; selectedItems.add(cb.value); });
            } else {
                checkboxes.forEach(cb => { cb.checked = false; });
                selectedItems.clear();
            }
            updateBulkUI();
        }

        function updateBulkUI() {
            const bar = document.getElementById('bulkActionBar');
            document.getElementById('selectedCount').innerText = selectedItems.size;
            if (selectedItems.size > 0) bar.classList.remove('translate-y-full');
            else { bar.classList.add('translate-y-full'); document.getElementById('selectAll').checked = false; }
        }

        async function processBulkAction(endpoint, items, targetFolderPath = null) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPath, items, targetFolderPath })
            });
            const data = await res.json();
            if (data.success) { selectedItems.clear(); loadFiles(); } else alert(data.error);
        }

        function bulkMove() {
            const target = prompt(`Moving ${selectedItems.size} items.\nEnter destination (leave blank for root '/'):`, "");
            if (target !== null) processBulkAction('/api/bulk-move', Array.from(selectedItems), target);
        }
        function bulkCopy() {
            const target = prompt(`Copying ${selectedItems.size} items.\nEnter destination (leave blank for root '/'):`, "");
            if (target !== null) processBulkAction('/api/bulk-copy', Array.from(selectedItems), target);
        }
        function bulkDelete() {
            if (confirm(`Delete ${selectedItems.size} items?`)) processBulkAction('/api/bulk-delete', Array.from(selectedItems));
        }

        async function createFolder() {
            const folderName = document.getElementById('folderName').value.trim();
            if (!folderName) return alert('Enter a folder name');
            const res = await fetch('/api/create-folder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPath, folderName })
            });
            const data = await res.json();
            if (data.success) { document.getElementById('folderName').value = ''; loadFiles(); }
            else alert(data.error);
        }

        // --- FAST CONCURRENT UPLOAD QUEUE ---
        function queueFiles(event) {
            const files = Array.from(event.target.files);
            if (!files.length) return;

            document.getElementById('uploadManager').classList.remove('hidden');
            
            // Auto-expand upload list on new files
            const list = document.getElementById('uploadList');
            const chevron = document.getElementById('uploadChevron');
            list.classList.remove('hidden');
            chevron.classList.remove('rotate-180');

            files.forEach(file => {
                const id = `upload_${uploadIdCounter++}`;
                let targetDir = currentPath;
                if (file.webkitRelativePath) {
                    const parts = file.webkitRelativePath.split('/'); parts.pop();
                    if (parts.length > 0) targetDir = currentPath ? `${currentPath}/${parts.join('/')}` : parts.join('/');
                }
                const task = { id, file, targetDir, xhr: new XMLHttpRequest(), status: 'pending' };
                taskMap.set(id, task);
                uploadQueue.push(task);
                createUploadUI(task);
            });
            
            event.target.value = ''; 
            processQueue();
        }

        function createUploadUI(task) {
            const list = document.getElementById('uploadList');
            const item = document.createElement('div');
            item.id = task.id;
            item.className = 'upload-card bg-white p-3 rounded-lg border border-gray-200 shadow-sm text-sm flex flex-col gap-2';
            item.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="font-medium truncate text-gray-700 w-[80%]">${task.file.name}</span>
                    <button onclick="cancelUpload('${task.id}')" class="p-1 text-gray-400 active:text-red-500 bg-gray-100 rounded-full">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="${task.id}_bar" class="bg-blue-500 h-2 rounded-full transition-all duration-200" style="width: 0%"></div>
                    </div>
                    <span id="${task.id}_text" class="text-xs text-gray-500 font-bold min-w-[2.5rem] text-right">0%</span>
                </div>
            `;
            list.prepend(item);
            updateUploadTitle();
        }

        function processQueue() {
            while (activeUploads < MAX_CONCURRENT_UPLOADS && uploadQueue.length > 0) {
                const task = uploadQueue.shift();
                if (task.status === 'cancelled') continue; 
                startUpload(task);
            }
            updateUploadTitle();
        }

        function startUpload(task) {
            activeUploads++;
            task.status = 'uploading';
            const formData = new FormData();
            formData.append('file', task.file);

            task.xhr.open('POST', `/api/upload?path=${encodeURIComponent(task.targetDir)}`, true);

            task.xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    document.getElementById(`${task.id}_bar`).style.width = percent + '%';
                    document.getElementById(`${task.id}_text`).innerText = percent + '%';
                }
            };

            task.xhr.onload = () => {
                activeUploads--;
                if (task.xhr.status === 200) {
                    task.status = 'completed';
                    updateUIDisplay(task.id, 'bg-green-500', 'Done');
                    document.getElementById(task.id).classList.add('completed');
                    if (task.targetDir === currentPath) loadFiles();
                } else {
                    task.status = 'error';
                    updateUIDisplay(task.id, 'bg-red-500', 'Error');
                }
                processQueue();
            };

            task.xhr.onerror = () => { activeUploads--; task.status = 'error'; updateUIDisplay(task.id, 'bg-red-500', 'Error'); processQueue(); };
            task.xhr.onabort = () => { activeUploads--; task.status = 'cancelled'; updateUIDisplay(task.id, 'bg-gray-400', 'Canceled', true); processQueue(); };
            task.xhr.send(formData);
        }

        function cancelUpload(id) {
            const task = taskMap.get(id);
            if (!task) return;
            if (task.status === 'pending') { task.status = 'cancelled'; updateUIDisplay(id, 'bg-gray-400', 'Canceled', true); } 
            else if (task.status === 'uploading') { task.xhr.abort(); } 
            else { document.getElementById(id).style.display = 'none'; }
        }

        function updateUIDisplay(id, colorClass, text, isCancelled = false) {
            const card = document.getElementById(id);
            const bar = document.getElementById(`${id}_bar`);
            if(bar) bar.className = `${colorClass} h-2 rounded-full`;
            const txt = document.getElementById(`${id}_text`);
            if(txt) txt.innerText = text;
            if (isCancelled && card) card.classList.add('cancelled');
        }

        function clearCompletedUploads() {
            const list = document.getElementById('uploadList');
            Array.from(list.children).forEach(card => {
                if (card.classList.contains('completed') || card.classList.contains('cancelled') || document.getElementById(`${card.id}_text`).innerText === 'Error') {
                    card.remove();
                    taskMap.delete(card.id);
                }
            });
            if (list.children.length === 0) document.getElementById('uploadManager').classList.add('hidden');
        }

        function updateUploadTitle() {
            const total = uploadQueue.length + activeUploads;
            document.getElementById('uploadTitle').innerText = total > 0 ? `Uploading: ${activeUploads} (Queue: ${uploadQueue.length})` : 'All Finished';
        }

        function toggleUploadQueue() {
            const list = document.getElementById('uploadList');
            const chevron = document.getElementById('uploadChevron');
            list.classList.toggle('hidden');
            chevron.classList.toggle('rotate-180');
        }

        // --- SINGLE ACTION MODAL (BOTTOM SHEET) ---
        function openModal(itemName, isZip) {
            actionItem = itemName;
            document.getElementById('modalTitle').innerText = itemName;
            
            const modal = document.getElementById('actionModal');
            const content = document.getElementById('actionModalContent');
            modal.classList.remove('hidden');
            
            // Trigger animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('translate-y-full'); // Mobile slide up
                content.classList.remove('scale-95'); // Desktop pop in
            }, 10);

            const btnContainer = document.getElementById('modalButtons');
            btnContainer.innerHTML = ''; 

            if (isZip) btnContainer.innerHTML += `<button onclick="singleUnzip()" class="w-full bg-green-50 text-green-700 p-4 rounded-xl font-semibold border border-green-200 active:bg-green-100 transition shadow-sm mb-2 flex items-center justify-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg> Extract Here</button>`;
            
            btnContainer.innerHTML += `
                <button onclick="singleAction('rename')" class="w-full text-left bg-gray-50 text-gray-700 p-4 rounded-xl font-medium border border-gray-200 active:bg-gray-100 transition">✏️ Rename</button>
                <button onclick="singleAction('copy')" class="w-full text-left bg-blue-50 text-blue-700 p-4 rounded-xl font-medium border border-blue-200 active:bg-blue-100 transition">📄 Copy</button>
                <button onclick="singleAction('move')" class="w-full text-left bg-indigo-50 text-indigo-700 p-4 rounded-xl font-medium border border-indigo-200 active:bg-indigo-100 transition">📁 Move</button>
                <button onclick="singleAction('delete')" class="w-full text-left bg-red-50 text-red-700 p-4 rounded-xl font-medium border border-red-200 active:bg-red-100 transition mt-2">🗑️ Delete</button>
            `;
        }
        
        function closeModal() { 
            const modal = document.getElementById('actionModal');
            const content = document.getElementById('actionModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                actionItem = null;
            }, 300); // Wait for transition
        }

        async function singleUnzip() {
            const item = actionItem; closeModal();
            const res = await fetch('/api/unzip', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ currentPath, fileName: item }) });
            if ((await res.json()).success) loadFiles(); else alert("Error extracting");
        }

        async function renameItem(oldName, newName) {
            const res = await fetch('/api/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ currentPath, oldName, newName }) });
            if ((await res.json()).success) loadFiles(); else alert("Error renaming");
        }

        function singleAction(type) {
            const item = actionItem; closeModal();
            // Tiny timeout allows modal to close before prompt blocks UI thread on mobile
            setTimeout(() => {
                if (type === 'rename') {
                    const newName = prompt(`Rename "${item}" to:`, item);
                    if (newName && newName.trim() !== '' && newName !== item) renameItem(item, newName.trim());
                } else if (type === 'delete') {
                    if (confirm(`Delete "${item}"?`)) processBulkAction('/api/bulk-delete', [item]);
                } else if (type === 'move') {
                    const target = prompt(`Moving "${item}".\nEnter destination (leave blank for root '/'):`, "");
                    if (target !== null) processBulkAction('/api/bulk-move', [item], target);
                } else if (type === 'copy') {
                    const target = prompt(`Copying "${item}".\nEnter destination (leave blank for root '/'):`, "");
                    if (target !== null) processBulkAction('/api/bulk-copy', [item], target);
                }
            }, 350);
        }
    </script>
</body>
</html>
