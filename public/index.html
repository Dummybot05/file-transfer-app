<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOS - File Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .drag-over { background-color: #eff6ff !important; border: 2px dashed #3b82f6; }
        
        /* Smooth transitions for upload cards */
        .upload-card { transition: all 0.3s ease; }
        .upload-card.completed { opacity: 0.6; }
        .upload-card.cancelled { opacity: 0.4; filter: grayscale(100%); }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans h-screen w-full flex flex-col overflow-hidden select-none">

    <header class="bg-gray-900 text-white h-16 flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold tracking-wide">CloudOS<span class="text-blue-500">.</span></h1>
            <div id="pathDisplay" class="text-sm bg-gray-800 px-3 py-1.5 rounded-md text-gray-300 flex items-center font-mono">/</div>
        </div>
        <div class="flex gap-3">
            <button onclick="goBack()" id="backBtn" class="hidden hover:bg-gray-800 p-2 rounded-md transition text-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Up Directory
            </button>
        </div>
    </header>

    <div class="border-b border-gray-200 bg-gray-50 p-4 flex flex-col sm:flex-row gap-4 justify-between shrink-0 z-10 shadow-sm">
        <div class="flex w-full sm:w-96 shadow-sm rounded-lg overflow-hidden border border-gray-300">
            <input type="text" id="folderName" placeholder="New Folder Name" class="px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <button onclick="createFolder()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 font-semibold transition border-l border-gray-300">Create</button>
        </div>
        
        <div class="flex gap-3">
            <label class="flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-lg hover:bg-blue-700 cursor-pointer transition font-semibold shadow-sm text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                Files
                <input type="file" multiple class="hidden" onchange="queueFiles(event)">
            </label>
            <label class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-700 cursor-pointer transition font-semibold shadow-sm text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                Folder
                <input type="file" webkitdirectory directory multiple class="hidden" onchange="queueFiles(event)">
            </label>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto bg-white" ondragover="allowDrop(event)" ondrop="dropToCurrent(event)">
        <table class="w-full text-left border-collapse">
            <thead class="sticky top-0 bg-white shadow-sm z-10">
                <tr class="text-gray-500 text-xs uppercase tracking-wider border-b border-gray-200">
                    <th class="py-4 pl-6 w-12 text-center"><input type="checkbox" id="selectAll" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500" onchange="toggleSelectAll(this)"></th>
                    <th class="py-4 font-semibold pl-2">Name</th>
                    <th class="py-4 font-semibold hidden md:table-cell w-32">Size</th>
                    <th class="py-4 font-semibold hidden sm:table-cell w-32">Type</th>
                    <th class="py-4 font-semibold text-right pr-6 w-24">Actions</th>
                </tr>
            </thead>
            <tbody id="fileList" class="text-sm">
                </tbody>
        </table>
    </main>

    <div id="bulkActionBar" class="fixed bottom-0 left-0 w-full bg-blue-900 text-white p-4 flex justify-between items-center transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.2)] z-30">
        <div class="font-semibold ml-4 text-blue-100"><span id="selectedCount" class="text-white font-bold text-lg">0</span> items selected</div>
        <div class="flex gap-3 mr-4">
            <button onclick="bulkCopy()" class="bg-blue-800 hover:bg-blue-700 border border-blue-700 px-5 py-2 rounded-lg font-semibold transition text-sm">Copy</button>
            <button onclick="bulkMove()" class="bg-blue-800 hover:bg-blue-700 border border-blue-700 px-5 py-2 rounded-lg font-semibold transition text-sm">Move</button>
            <button onclick="bulkDelete()" class="bg-red-500 hover:bg-red-400 border border-red-500 px-5 py-2 rounded-lg font-semibold transition text-sm">Delete</button>
        </div>
    </div>

    <div id="uploadManager" class="fixed bottom-6 right-6 w-96 bg-white border border-gray-200 shadow-2xl rounded-xl flex flex-col hidden z-40 max-h-[60vh]">
        <div class="bg-gray-900 text-white p-4 rounded-t-xl flex justify-between items-center cursor-pointer shrink-0" onclick="toggleUploadQueue()">
            <h3 class="font-bold text-sm" id="uploadTitle">Uploads</h3>
            <button id="clearUploadsBtn" class="text-xs text-gray-400 hover:text-white" onclick="event.stopPropagation(); clearCompletedUploads()">Clear Done</button>
        </div>
        <div id="uploadList" class="flex-1 overflow-y-auto p-2 space-y-2 bg-gray-50 hide-scroll">
            </div>
    </div>

    <div id="actionModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl transform scale-95 transition-transform duration-200" id="actionModalContent">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-900 mb-6 truncate border-b pb-4">Options</h3>
            <div id="modalButtons" class="flex flex-col gap-3"></div>
            <button onclick="closeModal()" class="mt-6 w-full bg-gray-100 text-gray-700 p-3 rounded-xl font-semibold hover:bg-gray-200 transition">Cancel</button>
        </div>
    </div>

    <script>
        let currentPath = '';
        let selectedItems = new Set();
        let actionItem = null;
        let isNavigating = false; 

        // --- CONCURRENT UPLOAD SYSTEM ---
        const MAX_CONCURRENT_UPLOADS = 5; // Upload up to 5 files simultaneously
        let uploadQueue = [];
        let activeUploads = 0;
        let uploadIdCounter = 0;

        function formatBytes(bytes, decimals = 2) {
            if (!bytes) return '0 Bytes';
            const k = 1024, dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        document.addEventListener('DOMContentLoaded', loadFiles);

        async function loadFiles() {
            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(currentPath)}`);
                const data = await res.json();
                if (data.error) return alert(data.error);

                selectedItems.clear();
                updateBulkUI();
                document.getElementById('selectAll').checked = false;

                document.getElementById('pathDisplay').innerText = `/${currentPath}`;
                document.getElementById('backBtn').classList.toggle('hidden', currentPath === '');
                
                const tbody = document.getElementById('fileList');
                tbody.innerHTML = '';

                if (data.files.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="py-16 text-center text-gray-400 font-medium text-base">This folder is empty.<br><span class="text-sm font-normal">Drag and drop files here to upload.</span></td></tr>`;
                    return;
                }

                data.files.sort((a, b) => b.isDirectory - a.isDirectory).forEach(file => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-100 hover:bg-blue-50 transition-colors group cursor-default';
                    tr.draggable = true;
                    tr.ondragstart = (e) => dragStart(e, file.name);

                    if (file.isDirectory) {
                        tr.ondragover = allowDrop;
                        tr.ondragleave = dragLeave;
                        tr.ondrop = (e) => dropOnFolder(e, file.name);
                    }
                    
                    let icon = file.isDirectory ? 
                        `<svg class="w-6 h-6 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>` : 
                        `<svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`;

                    let nameHtml = file.isDirectory 
                        ? `<button onclick="navigateTo('${file.name}')" class="text-gray-900 font-semibold hover:text-blue-600 flex items-center gap-3 py-3 w-full text-left truncate transition">${icon} ${file.name}</button>`
                        : `<span class="flex items-center gap-3 text-gray-700 py-3 font-medium truncate">${icon} ${file.name}</span>`;

                    tr.innerHTML = `
                        <td class="text-center pl-6 w-12">
                            <input type="checkbox" class="file-checkbox w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity" ${selectedItems.has(file.name) ? 'checked opacity-100' : ''} value="${file.name}" onchange="toggleSelection(this, '${file.name}')">
                        </td>
                        <td class="pl-2 w-full md:w-auto">${nameHtml}</td>
                        <td class="text-gray-500 hidden md:table-cell">${file.isDirectory ? '--' : formatBytes(file.size)}</td>
                        <td class="text-gray-500 hidden sm:table-cell">${file.isDirectory ? 'Folder' : 'File'}</td>
                        <td class="pr-6 text-right">
                            <button onclick="openModal('${file.name}', ${file.isZip})" class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-100 rounded-lg transition opacity-0 group-hover:opacity-100">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                            </button>
                        </td>
                    `;
                    // Keep checkbox visible if selected
                    if (selectedItems.has(file.name)) tr.querySelector('.file-checkbox').classList.remove('opacity-0');
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        // --- NAVIGATION & BULK ACTIONS ---
        function navigateTo(folder) {
            if (isNavigating) return;
            isNavigating = true;
            currentPath = currentPath ? `${currentPath}/${folder}` : folder;
            loadFiles().finally(() => isNavigating = false);
        }

        function goBack() {
            if (isNavigating || !currentPath) return;
            isNavigating = true;
            const parts = currentPath.split('/');
            parts.pop();
            currentPath = parts.join('/');
            loadFiles().finally(() => isNavigating = false);
        }

        function toggleSelection(checkbox, name) {
            if (checkbox.checked) {
                selectedItems.add(name);
                checkbox.classList.remove('opacity-0');
            } else {
                selectedItems.delete(name);
                checkbox.classList.add('opacity-0');
            }
            updateBulkUI();
        }

        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('.file-checkbox');
            if (checkbox.checked) {
                checkboxes.forEach(cb => { cb.checked = true; cb.classList.remove('opacity-0'); selectedItems.add(cb.value); });
            } else {
                checkboxes.forEach(cb => { cb.checked = false; cb.classList.add('opacity-0'); });
                selectedItems.clear();
            }
            updateBulkUI();
        }

        function updateBulkUI() {
            const bar = document.getElementById('bulkActionBar');
            document.getElementById('selectedCount').innerText = selectedItems.size;
            if (selectedItems.size > 0) bar.classList.remove('translate-y-full');
            else { bar.classList.add('translate-y-full'); document.getElementById('selectAll').checked = false; }
        }

        // --- DRAG AND DROP ---
        function dragStart(e, name) {
            let itemsToDrag = Array.from(selectedItems);
            if (!selectedItems.has(name)) itemsToDrag = [name];
            e.dataTransfer.setData('text/plain', JSON.stringify(itemsToDrag));
            e.dataTransfer.effectAllowed = 'move';
        }

        function allowDrop(e) { 
            e.preventDefault(); 
            if(e.currentTarget.tagName === 'TR') e.currentTarget.classList.add('drag-over'); 
        }
        function dragLeave(e) { 
            if(e.currentTarget.tagName === 'TR') e.currentTarget.classList.remove('drag-over'); 
        }

        async function dropOnFolder(e, folderName) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            e.stopPropagation();
            try {
                const items = JSON.parse(e.dataTransfer.getData('text/plain'));
                const targetPath = currentPath ? `${currentPath}/${folderName}` : folderName;
                await processBulkAction('/api/bulk-move', items, targetPath);
            } catch(err) { handleFileDrop(e, currentPath ? `${currentPath}/${folderName}` : folderName); }
        }

        async function dropToCurrent(e) {
            e.preventDefault();
            handleFileDrop(e, currentPath);
        }

        function handleFileDrop(e, targetDir) {
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                queueFiles({ target: { files: e.dataTransfer.files } }, targetDir);
            }
        }

        async function processBulkAction(endpoint, items, targetFolderPath = null) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPath, items, targetFolderPath })
            });
            const data = await res.json();
            if (data.success) { selectedItems.clear(); loadFiles(); } else alert(data.error);
        }

        function bulkMove() {
            const target = prompt(`Moving ${selectedItems.size} items.\nEnter destination folder (leave blank for root '/'):`, "");
            if (target !== null) processBulkAction('/api/bulk-move', Array.from(selectedItems), target);
        }
        function bulkCopy() {
            const target = prompt(`Copying ${selectedItems.size} items.\nEnter destination folder (leave blank for root '/'):`, "");
            if (target !== null) processBulkAction('/api/bulk-copy', Array.from(selectedItems), target);
        }
        function bulkDelete() {
            if (confirm(`Are you sure you want to delete ${selectedItems.size} items?`)) {
                processBulkAction('/api/bulk-delete', Array.from(selectedItems));
            }
        }

        async function createFolder() {
            const folderName = document.getElementById('folderName').value.trim();
            if (!folderName) return alert('Enter a folder name');
            const res = await fetch('/api/create-folder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPath, folderName })
            });
            const data = await res.json();
            if (data.success) { document.getElementById('folderName').value = ''; loadFiles(); }
            else alert(data.error);
        }


        // --- FAST UPLOAD QUEUE & LOGIC ---
        function queueFiles(event, dropPath = null) {
            const files = Array.from(event.target.files);
            if (!files.length) return;

            const baseUploadPath = dropPath !== null ? dropPath : currentPath;
            document.getElementById('uploadManager').classList.remove('hidden');

            files.forEach(file => {
                const id = `upload_${uploadIdCounter++}`;
                
                // Determine accurate path for folders
                let targetDir = baseUploadPath;
                if (file.webkitRelativePath) {
                    const pathParts = file.webkitRelativePath.split('/');
                    pathParts.pop(); 
                    if (pathParts.length > 0) {
                        targetDir = baseUploadPath ? `${baseUploadPath}/${pathParts.join('/')}` : pathParts.join('/');
                    }
                }

                const uploadTask = { id, file, targetDir, xhr: new XMLHttpRequest(), status: 'pending' };
                uploadQueue.push(uploadTask);
                createUploadUI(uploadTask);
            });
            
            event.target.value = ''; 
            processQueue();
        }

        function createUploadUI(task) {
            const list = document.getElementById('uploadList');
            const item = document.createElement('div');
            item.id = task.id;
            item.className = 'upload-card bg-white p-3 rounded-lg border border-gray-100 shadow-sm text-sm flex flex-col gap-2';
            item.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="font-medium truncate text-gray-700 w-3/4" title="${task.file.name}">${task.file.name}</span>
                    <button onclick="cancelUpload('${task.id}')" class="text-gray-400 hover:text-red-500" title="Cancel">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-full bg-gray-200 rounded-full h-1.5">
                        <div id="${task.id}_bar" class="bg-blue-500 h-1.5 rounded-full" style="width: 0%"></div>
                    </div>
                    <span id="${task.id}_text" class="text-xs text-gray-500 whitespace-nowrap min-w-[3rem] text-right">0%</span>
                </div>
            `;
            list.prepend(item); // Add to top
            updateUploadTitle();
        }

        function processQueue() {
            while (activeUploads < MAX_CONCURRENT_UPLOADS && uploadQueue.length > 0) {
                const task = uploadQueue.shift();
                if (task.status === 'cancelled') continue; 
                startUpload(task);
            }
            updateUploadTitle();
        }

        function startUpload(task) {
            activeUploads++;
            task.status = 'uploading';
            const formData = new FormData();
            formData.append('file', task.file);

            task.xhr.open('POST', `/api/upload?path=${encodeURIComponent(task.targetDir)}`, true);

            task.xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    document.getElementById(`${task.id}_bar`).style.width = percent + '%';
                    document.getElementById(`${task.id}_text`).innerText = percent + '%';
                }
            };

            task.xhr.onload = () => {
                activeUploads--;
                const card = document.getElementById(task.id);
                if (task.xhr.status === 200) {
                    task.status = 'completed';
                    document.getElementById(`${task.id}_bar`).classList.replace('bg-blue-500', 'bg-green-500');
                    document.getElementById(`${task.id}_text`).innerText = 'Done';
                    card.classList.add('completed');
                    // Refresh view if the uploaded file is in the current visible directory
                    if (task.targetDir === currentPath) loadFiles();
                } else {
                    task.status = 'error';
                    document.getElementById(`${task.id}_bar`).classList.replace('bg-blue-500', 'bg-red-500');
                    document.getElementById(`${task.id}_text`).innerText = 'Error';
                }
                processQueue();
            };

            task.xhr.onerror = () => {
                activeUploads--;
                task.status = 'error';
                document.getElementById(`${task.id}_bar`).classList.replace('bg-blue-500', 'bg-red-500');
                document.getElementById(`${task.id}_text`).innerText = 'Error';
                processQueue();
            };

            task.xhr.onabort = () => {
                activeUploads--;
                task.status = 'cancelled';
                const card = document.getElementById(task.id);
                document.getElementById(`${task.id}_bar`).classList.replace('bg-blue-500', 'bg-gray-400');
                document.getElementById(`${task.id}_text`).innerText = 'Canceled';
                card.classList.add('cancelled');
                processQueue();
            };

            task.xhr.send(formData);
        }

        function cancelUpload(id) {
            // Find in active or queue
            const card = document.getElementById(id);
            if (!card) return;
            
            // It might be uploading right now
            const isUploading = card.querySelector('.bg-blue-500');
            if (isUploading) {
                // We don't have direct access to the active tasks list easily in this simple structure, 
                // but we know `xhr.abort()` triggers `onabort` which handles state cleanup.
                // Because we need the XHR reference, let's find it (hacky but works without complex state management)
                // In a true reactive app we'd keep the task list in a map. Let's assume user triggers UI.
            }
            // For true cancellation, we need the task object. Let's maintain a dictionary for active tasks in a real scenario.
            // Since this is vanilla JS, I will trigger the visual change and prevent it if pending.
            const pendingIndex = uploadQueue.findIndex(t => t.id === id);
            if (pendingIndex > -1) {
                uploadQueue[pendingIndex].status = 'cancelled';
                document.getElementById(`${id}_bar`).classList.replace('bg-blue-500', 'bg-gray-400');
                document.getElementById(`${id}_text`).innerText = 'Canceled';
                card.classList.add('cancelled');
            } else {
                // It's active, we need to abort it. Since we didn't store active tasks in a map, 
                // we should have added `onclick="cancelUpload('${task.id}', task)"`.
                // Let's modify the cancel UI to just hide it if completed, or implement a map.
                alert("Upload is already processing or finished. Aborting requires maintaining a task map (simplified here).");
                card.style.display = 'none';
            }
        }
        
        // Let's inject a proper global task map to make cancellation flawless
        const taskMap = new Map();
        // Override the queue creation to populate map
        const originalQueueFiles = queueFiles;
        queueFiles = (event, dropPath) => {
            const files = Array.from(event.target.files);
            const baseUploadPath = dropPath !== null ? dropPath : currentPath;
            document.getElementById('uploadManager').classList.remove('hidden');
            files.forEach(file => {
                const id = `upload_${uploadIdCounter++}`;
                let targetDir = baseUploadPath;
                if (file.webkitRelativePath) {
                    const parts = file.webkitRelativePath.split('/'); parts.pop();
                    if (parts.length > 0) targetDir = baseUploadPath ? `${baseUploadPath}/${parts.join('/')}` : parts.join('/');
                }
                const task = { id, file, targetDir, xhr: new XMLHttpRequest(), status: 'pending' };
                taskMap.set(id, task);
                uploadQueue.push(task);
                createUploadUI(task);
            });
            event.target.value = ''; processQueue();
        };

        // Proper Cancel Function
        function cancelUpload(id) {
            const task = taskMap.get(id);
            if (!task) return;
            if (task.status === 'pending') {
                task.status = 'cancelled';
                updateUIDisplay(id, 'bg-gray-400', 'Canceled', true);
            } else if (task.status === 'uploading') {
                task.xhr.abort(); // Triggers onabort which handles the rest
            } else {
                // If done/error, just remove UI
                document.getElementById(id).style.display = 'none';
            }
        }

        function updateUIDisplay(id, colorClass, text, isCancelled = false) {
            const card = document.getElementById(id);
            const bar = document.getElementById(`${id}_bar`);
            bar.className = `${colorClass} h-1.5 rounded-full`;
            document.getElementById(`${id}_text`).innerText = text;
            if (isCancelled) card.classList.add('cancelled');
        }

        function clearCompletedUploads() {
            const list = document.getElementById('uploadList');
            Array.from(list.children).forEach(card => {
                if (card.classList.contains('completed') || card.classList.contains('cancelled') || document.getElementById(`${card.id}_text`).innerText === 'Error') {
                    card.remove();
                    taskMap.delete(card.id);
                }
            });
            if (list.children.length === 0) document.getElementById('uploadManager').classList.add('hidden');
        }

        function updateUploadTitle() {
            const total = uploadQueue.length + activeUploads;
            document.getElementById('uploadTitle').innerText = total > 0 ? `Uploading ${activeUploads} (Queue: ${uploadQueue.length})` : 'Uploads Finished';
        }

        function toggleUploadQueue() {
            const list = document.getElementById('uploadList');
            list.classList.toggle('hidden');
        }

        // --- SINGLE ACTION MODAL ---
        function openModal(itemName, isZip) {
            actionItem = itemName;
            document.getElementById('modalTitle').innerText = itemName;
            
            const modal = document.getElementById('actionModal');
            const content = document.getElementById('actionModalContent');
            modal.classList.remove('hidden');
            // Small delay to trigger Tailwind transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);

            const btnContainer = document.getElementById('modalButtons');
            btnContainer.innerHTML = ''; 

            if (isZip) btnContainer.innerHTML += `<button onclick="singleUnzip()" class="w-full bg-green-50 text-green-700 p-4 rounded-xl font-semibold border border-green-200 hover:bg-green-100 transition shadow-sm mb-2 flex items-center justify-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg> Extract Here</button>`;
            
            btnContainer.innerHTML += `
                <button onclick="singleAction('rename')" class="w-full bg-gray-50 text-gray-700 p-3 rounded-xl font-semibold border border-gray-200 hover:bg-gray-100 transition">Rename</button>
                <button onclick="singleAction('copy')" class="w-full bg-blue-50 text-blue-700 p-3 rounded-xl font-semibold border border-blue-200 hover:bg-blue-100 transition">Copy</button>
                <button onclick="singleAction('move')" class="w-full bg-indigo-50 text-indigo-700 p-3 rounded-xl font-semibold border border-indigo-200 hover:bg-indigo-100 transition">Move</button>
                <button onclick="singleAction('delete')" class="w-full bg-red-50 text-red-700 p-3 rounded-xl font-semibold border border-red-200 hover:bg-red-100 transition mt-2">Delete</button>
            `;
        }
        
        function closeModal() { 
            const modal = document.getElementById('actionModal');
            const content = document.getElementById('actionModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                actionItem = null;
            }, 200);
        }

        async function singleUnzip() {
            const item = actionItem; closeModal();
            const res = await fetch('/api/unzip', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ currentPath, fileName: item }) });
            if ((await res.json()).success) loadFiles(); else alert("Error extracting");
        }

        async function renameItem(oldName, newName) {
            const res = await fetch('/api/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ currentPath, oldName, newName }) });
            if ((await res.json()).success) loadFiles(); else alert("Error renaming");
        }

        function singleAction(type) {
            const item = actionItem; closeModal();
            if (type === 'rename') {
                const newName = prompt(`Rename "${item}" to:`, item);
                if (newName && newName.trim() !== '' && newName !== item) renameItem(item, newName.trim());
            } else if (type === 'delete') {
                if (confirm(`Delete "${item}"?`)) processBulkAction('/api/bulk-delete', [item]);
            } else if (type === 'move') {
                const target = prompt(`Moving "${item}".\nEnter destination (leave blank for root '/'):`, "");
                if (target !== null) processBulkAction('/api/bulk-move', [item], target);
            } else if (type === 'copy') {
                const target = prompt(`Copying "${item}".\nEnter destination (leave blank for root '/'):`, "");
                if (target !== null) processBulkAction('/api/bulk-copy', [item], target);
            }
        }
    </script>
</body>
</html>
